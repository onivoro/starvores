name: publish-datavore

on:
  push:
    branches: [main]
    paths:
      - apps/server/datavore/package.json

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for version change
        id: version_check
        run: |
          LOCAL=$(node -p "require('./apps/server/datavore/package.json').version")
          PUBLISHED=$(npm view @onivoro/app-server-datavore version 2>/dev/null || echo "0.0.0")
          echo "local=$LOCAL published=$PUBLISHED"
          [ "$LOCAL" != "$PUBLISHED" ] && echo "changed=true" >> "$GITHUB_OUTPUT" || echo "changed=false" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        if: steps.version_check.outputs.changed == 'true'
        with:
          node-version: 22.16.0
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.version_check.outputs.changed == 'true'
        run: npm ci

      - name: Obtain npm publish token via OIDC
        if: steps.version_check.outputs.changed == 'true'
        run: |
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://registry.npmjs.org" | jq -r '.value')
          NPM_TOKEN=$(curl -sS -X POST https://registry.npmjs.org/-/npm/v1/security/oidc/token \
            -H "Content-Type: application/json" \
            -d "{\"token\": \"${OIDC_TOKEN}\"}" | jq -r '.token')
          echo "::add-mask::${NPM_TOKEN}"
          echo "NPM_TOKEN=${NPM_TOKEN}" >> "$GITHUB_ENV"

      - name: Build and publish
        if: steps.version_check.outputs.changed == 'true'
        run: npx nx run app-server-datavore:deploy-fullstack
        env:
          NPM_CONFIG_PROVENANCE: true
          NODE_ENV: production
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Tag release
        if: steps.version_check.outputs.changed == 'true'
        run: |
          VERSION=$(node -p "require('./apps/server/datavore/package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "datavore-v${VERSION}"
          git push origin "datavore-v${VERSION}"
